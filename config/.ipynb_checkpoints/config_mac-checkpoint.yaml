# ==============================================================================
# Secretome Prediction Pipeline — Local (macOS/Linux) Configuration Template
# ==============================================================================
# Copy this file to config.yaml and adjust paths for your system.
# ==============================================================================

tools:
  # Output of: conda info --base
  conda_base: "~/miniforge3"

  signalp:
    conda_env: "signalp6_env"
    cmd: "signalp6"

  deeploc:
    conda_env: "deeploc2"
    cmd: "deeploc2"
    model: "Fast"
    device: "mps"           # "mps" for Apple Silicon, "cpu" for Linux

  targetp:
    conda_env: "targetp2_env"
    cmd: "/path/to/targetp-2.0/bin/targetp"

  asafind:
    conda_env: "targetp2_env"
    venv: "/path/to/ASAFind_2.0/asafind_command_line"
    script: "/path/to/ASAFind_2.0/S0_ASAFind.py"

  deeptmhmm:
    # --- Choose ONE method ---
    # Option A: DTU local package (recommended)
    method: "local"
    conda_env: "deeptmhmm_env"
    predict_py: "/path/to/DeepTMHMM-Academic-License-v1.0/predict.py"
    # Option B: biolib local (requires Docker Desktop)
    # method: "biolib_local"

# ------------------------------------------------------------------------------
# Samples
# ------------------------------------------------------------------------------
samples:
  # Example:
  # Stri:
  #   proteome: "data/raw/Stri.faa"
  #   organism_type: "plant_complex"   # prokaryote | animal | plant_simple | plant_complex
  #   signalp_organism: "other"        # eukarya | other | gram-negative | gram-positive
  # Synechocystis:
  #   proteome: "data/raw/Synechocystis.faa"
  #   organism_type: "prokaryote"
  #   signalp_organism: "gram-negative"

cdhit:
  identity: 0.99
  word_size: 5
  threads: 8

targetp_remove:
  prokaryote:    []
  animal:        ["mTP"]
  plant_simple:  ["mTP", "cTP"]
  plant_complex: ["mTP", "cTP", "luTP"]

er_motifs: ["KDEL", "HDEL", "RDEL", "KEEL", "RDEF"]

threads: 8
