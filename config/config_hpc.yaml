# ==============================================================================
# Secretome Prediction Pipeline — HPC Configuration Template
# ==============================================================================
# Copy this file to config.yaml and adjust paths for your system.
# ==============================================================================

tools:
  # Output of: conda info --base (after loading your conda module)
  conda_base: "/path/to/conda"

  signalp:
    conda_env: "signalp6_env"
    cmd: "signalp6"

  deeploc:
    conda_env: "deeploc2"
    cmd: "deeploc2"
    model: "Fast"           # "Fast" or "Accurate"
    device: "cuda"          # "cpu" or "cuda"

  # DeepLocPro 1.0 (prokaryotes only)
  deeplocpro:
    conda_env: "deeplocpro"
    cmd: "deeplocpro"
    extra_flags: ""         # e.g. "--organism gram_negative"

  targetp:
    conda_env: "targetp2_env"
    cmd: "/path/to/targetp-2.0/bin/targetp"

  asafind:
    conda_env: "targetp2_env"
    venv: "/path/to/ASAFind_2.0/asafind_command_line"
    script: "/path/to/ASAFind_2.0/ASAFind-2/S0_ASAFind.py"

  deeptmhmm:
    # --- Choose ONE method ---
    # Option A: Apptainer (recommended for HPC)
    method: "apptainer"
    sif: "/path/to/deeptmhmm"
    # Option B: DTU local package
    # method: "local"
    # conda_env: "deeptmhmm_env"
    # predict_py: "/path/to/DeepTMHMM/predict.py"
    # Option C: biolib remote (requires internet)
    # method: "biolib"
    # conda_env: "deeptmhmm_env"

# ------------------------------------------------------------------------------
# Samples — add your proteomes here
# ------------------------------------------------------------------------------
samples:
  # Example entries:
  # Cladocopium:
  #   proteome: "data/raw/Cladocopium.faa"
  #   organism_type: "plant_complex"   # prokaryote | animal | plant_simple | plant_complex
  #   signalp_organism: "other"        # eukarya | other | gram-negative | gram-positive
  # Synechocystis:
  #   proteome: "data/raw/Synechocystis.faa"
  #   organism_type: "prokaryote"
  #   signalp_organism: "gram-negative"

# CD-HIT settings
cdhit:
  identity: 0.99
  word_size: 5
  threads: 8

# TargetP classes to exclude per organism type (prokaryote: not used)
targetp_remove:
  prokaryote:    []
  animal:        ["mTP"]
  plant_simple:  ["mTP", "cTP"]
  plant_complex: ["mTP", "cTP", "luTP"]

# ER-retention motifs (exact C-terminal tetrapeptides)
er_motifs: ["KDEL", "HDEL", "RDEL", "KEEL", "RDEF"]

threads: 8
